# 1. ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: stream-config
data:
  WELCOME_MSG: "StreamFlow v1.0"
---
# 2. Catalog Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog
  template:
    metadata:
      labels:
        app: catalog
    spec:
      containers:
      - name: server
        image: streamflow-mock:v1
        imagePullPolicy: Never
        env: [{name: SERVICE_NAME, value: "catalog"}]
        ports: [{containerPort: 8080}]
        livenessProbe:
          httpGet: {path: /healthz, port: 8080}
          initialDelaySeconds: 3
          periodSeconds: 5
---
# 3. Catalog Service
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector: {app: catalog}
  ports: [{port: 80, targetPort: 8080}]
---
# 4. API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: server
        image: streamflow-mock:v1
        imagePullPolicy: Never
        env: [{name: SERVICE_NAME, value: "api"}]
        ports: [{containerPort: 8080}]
        livenessProbe:
          httpGet: {path: /healthz, port: 8080}
          initialDelaySeconds: 3
---
# 5. API Service
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector: {app: api}
  ports: [{port: 80, targetPort: 8080}]
---
# 6. Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stream-ingress
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: {name: api-service, port: {number: 80}}
---
# 7. Transcoder (Тот самый "потеряшка")
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcoder-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: transcoder
  template:
    metadata:
      labels:
        app: transcoder
    spec:
      containers:
      - name: worker
        image: streamflow-mock:v1
        imagePullPolicy: Never
        env: [{name: SERVICE_NAME, value: "transcoder"}]
        livenessProbe:
          httpGet: {path: /healthz, port: 8080}
          initialDelaySeconds: 3